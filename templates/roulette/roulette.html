<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../templates/roulette/roulette.css">
    <title>Roulette</title>
</head>
<body>
    <div class="table-glow"></div>
    <div class="container">
        <header class="hero">
            <p class="eyebrow">Casino Royale</p>
            <h1>Roulette</h1>
            <p class="status">Feeling lucky? Place your bet and spin the wheel!</p>
        </header>

        <div class="scoreboard">
            <div><span>Chips</span><strong id="chips">1000</strong></div>
            <div><span>Current Bet</span><strong id="betAmount">0</strong></div>
            <div><span>Wins</span><strong id="wins">0</strong></div>
        </div>

        <div class="game-area">
            <div class="hand-panel">
                <h2>Wheel</h2>
                <div class="wheel-strip" id="wheelStrip"></div>
            </div>

            <div class="hand-panel">
                <h2>Choose Bet Amount</h2>
                <div class="actions">
                    <button type="button" class="action-button" data-chip="10">+10</button>
                    <button type="button" class="action-button" data-chip="50">+50</button>
                    <button type="button" class="action-button" data-chip="100">+100</button>
                    <button type="button" class="action-button danger" id="clearBetBtn">Clear</button>
                </div>
            </div>

            <div class="hand-panel">
                <h2>Outside Bets</h2>
                <div class="actions">
                    <button type="button" class="action-button" data-bet="red">Red</button>
                    <button type="button" class="action-button" data-bet="black">Black</button>
                    <button type="button" class="action-button" data-bet="even">Even</button>
                    <button type="button" class="action-button" data-bet="odd">Odd</button>
                    <button type="button" class="action-button" data-bet="low">1-18</button>
                    <button type="button" class="action-button" data-bet="high">19-36</button>
                </div>
            </div>

            <div class="hand-panel">
                <h2>Straight Up Numbers (red / black / green 0)</h2>
                <div class="number-grid" id="numberGrid"></div>
            </div>

            <div class="actions">
                <button type="button" class="action-button primary" id="rollBtn">Spin the Wheel</button>
            </div>

            <div class="hand-panel">
                <h2>Result</h2>
                <div class="cards">
                    <div class="card" id="resultCard">-</div>
                </div>
                <p class="status" id="landedOnText">Place a bet to begin.</p>
            </div>
        </div>
    </div>
    <script src="../../templates/roulette/roulette.js"></script>
</body>
</html>
